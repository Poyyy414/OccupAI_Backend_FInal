<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OccupAI - Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }

    :root {
      --bg: #0a0d12;
      --shell: #0f141b;
      --surface: #151b24;
      --surface-2: #1a222d;
      --border: #2a3544;
      --text: #f4f7fb;
      --muted: #8b98aa;
      --muted-2: #657286;
      --green: #27d497;
      --blue: #5aa9ff;
      --orange: #f4a261;
      --red: #ff5c7a;
      --radius: 8px;
    }

    html { color-scheme: dark; }

    body {
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(39, 212, 151, .08), transparent 34%),
        linear-gradient(225deg, rgba(90, 169, 255, .08), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    .mono { font-family: "Space Mono", ui-monospace, SFMono-Regular, Consolas, monospace; }

    .auth-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(420px, .75fr);
    }

    .visual-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 36px;
      min-height: 100vh;
      padding: 34px;
      overflow: hidden;
      border-right: 1px solid rgba(42, 53, 68, .7);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .035), transparent),
        rgba(15, 20, 27, .78);
    }

    .visual-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(90deg, black, transparent 86%);
    }

    .brand-row, .visual-content { position: relative; z-index: 1; }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--green), #8ff1cb);
      color: #06110d;
      font-family: "Space Mono", monospace;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(39, 212, 151, .24);
    }

    .brand-name { font-size: 18px; font-weight: 800; }
    .brand-meta { margin-top: 2px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, .035);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .status-chip::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(39, 212, 151, .11);
    }

    .visual-content {
      width: min(680px, 100%);
      display: grid;
      gap: 24px;
      margin-top: clamp(42px, 10vh, 108px);
    }

    .eyebrow {
      color: var(--green);
      font-family: "Space Mono", monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .14em;
    }

    h1 {
      max-width: 640px;
      margin-top: 8px;
      font-size: clamp(34px, 5vw, 66px);
      line-height: 1;
      font-weight: 800;
    }

    .lead {
      max-width: 560px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .form-panel {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 28px;
      background: rgba(10, 13, 18, .72);
    }

    .auth-card {
      width: min(100%, 410px);
      padding: 26px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, .05), rgba(255, 255, 255, .025));
      box-shadow: 0 24px 80px rgba(0, 0, 0, .28);
    }

    .card-title { font-size: 25px; line-height: 1.12; font-weight: 800; }
    .card-sub { margin-top: 8px; margin-bottom: 24px; color: var(--muted); font-size: 14px; }
    .card-sub a { color: var(--green); font-weight: 700; text-decoration: none; }
    .card-sub a:hover { text-decoration: underline; }

    .field { margin-bottom: 15px; }
    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .field input {
      width: 100%;
      min-height: 46px;
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: 0;
      background: #0c1118;
      color: var(--text);
      font-size: 15px;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .field input:focus {
      border-color: rgba(39, 212, 151, .72);
      background: #0e141c;
      box-shadow: 0 0 0 4px rgba(39, 212, 151, .12);
    }

    .field input::placeholder { color: var(--muted-2); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      min-height: 48px;
      margin-top: 4px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--green), #8ff1cb);
      color: #06110d;
      font-weight: 800;
      transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 14px 34px rgba(39, 212, 151, .22); }
    .btn:disabled { cursor: wait; opacity: .72; transform: none; box-shadow: none; }

    .error-box {
      display: none;
      margin-bottom: 14px;
      padding: 11px 12px;
      border: 1px solid rgba(255, 92, 122, .32);
      border-radius: var(--radius);
      background: rgba(255, 92, 122, .1);
      color: #ff9aad;
      font-size: 13px;
      line-height: 1.45;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(6, 17, 13, .24);
      border-top-color: #06110d;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      .auth-shell { grid-template-columns: 1fr; }
      .visual-panel {
        min-height: auto;
        padding: 22px;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      .visual-content { gap: 16px; }
      h1 { font-size: 34px; }
      .lead { font-size: 14px; }
      .form-panel { min-height: auto; padding: 22px; }
    }

    @media (max-width: 560px) {
      .brand-row { align-items: flex-start; flex-direction: column; }
      .auth-card { padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="visual-panel">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <div class="brand-name">OccupAI</div>
            <div class="brand-meta">Parking Ops</div>
          </div>
        </div>
        <div class="status-chip">Live ready</div>
      </div>

      <div class="visual-content">
        <div>
          <div class="eyebrow">105 Penafrancia Ave</div>
          <h1>Real-time parking intelligence.</h1>
        </div>
        <p class="lead">Monitor occupancy, live camera status, forecasts, and pricing recommendations from one focused operations dashboard.</p>
      </div>
    </section>

    <section class="form-panel">
      <div class="auth-card">
        <div class="card-title">Welcome back</div>
        <div class="card-sub">No account yet? <a href="/register">Create one</a></div>

        <div class="error-box" id="error-box"></div>

        <form id="loginForm">
          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
          </div>

          <button class="btn" id="btn-login" type="submit">Sign in</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    (function () {
      try {
        const raw = localStorage.getItem('occupai_user');
        if (!raw || raw === 'undefined' || raw === 'null') {
          localStorage.removeItem('occupai_user');
          return;
        }
        const u = JSON.parse(raw);
        if (u && typeof u === 'object' && u.user_id) {
          window.location.href = '/dashboard';
        } else {
          localStorage.removeItem('occupai_user');
        }
      } catch (e) {
        localStorage.removeItem('occupai_user');
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', doLogin);

    async function doLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-login');

      showErr('');
      if (!email || !password) {
        showErr('Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || data.message || 'Login failed.');
        }
        if (!data.user_id) {
          throw new Error('Server returned an invalid response. Please try again.');
        }

        const userObj = {
          user_id: data.user_id,
          first_name: data.first_name || '',
          last_name: data.last_name || '',
          full_name: data.full_name || ((data.first_name || '') + ' ' + (data.last_name || '')).trim(),
          email: data.email || email,
          role: data.role || 'driver',
        };

        localStorage.setItem('occupai_user', JSON.stringify(userObj));
        if (!localStorage.getItem('occupai_user')) {
          throw new Error('Could not save session. Check browser storage settings.');
        }

        btn.innerHTML = 'Redirecting...';
        setTimeout(() => { window.location.href = '/dashboard'; }, 100);
      } catch (e) {
        showErr(e.message);
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    function showErr(msg) {
      const box = document.getElementById('error-box');
      if (!msg) {
        box.style.display = 'none';
        box.textContent = '';
        return;
      }
      box.textContent = msg;
      box.style.display = 'block';
    }
  </script>
</body>
</html>
